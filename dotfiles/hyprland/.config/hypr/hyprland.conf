# Hawker NixOS - Hyprland Configuration
#
# Core config in conf.d/ -- always present
# Module fragments in modules.d/ -- added per stow package
# Theme override in active-theme.conf -- managed by hawker-theme-set

# Core
source = ~/.config/hypr/conf.d/env.conf
source = ~/.config/hypr/conf.d/monitors.conf
source = ~/.config/hypr/conf.d/input.conf
source = ~/.config/hypr/conf.d/appearance.conf
source = ~/.config/hypr/conf.d/windowrules.conf
source = ~/.config/hypr/conf.d/keybinds.conf
source = ~/.config/hypr/conf.d/autostart.conf

# Module extensions (each stow package drops its fragment here)
source = ~/.config/hypr/modules.d/*.conf

# Theme override
source = ~/.config/hypr/active-theme.conf
