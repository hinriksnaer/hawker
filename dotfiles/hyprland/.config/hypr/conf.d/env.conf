# Hyprland-specific environment variables
# System-wide env vars are set in NixOS modules (hyprland.nix, nvidia.nix, desktop-session.nix)
# Shell env vars are set in fish config (config.fish, conf.d/)

# Hyprpunk theme path (used by theme scripts in Hyprland session)
env = HAWKER_PATH,$HOME/.local/share/hawker
