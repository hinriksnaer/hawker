# Window rules

windowrule {
    name = file-dialogs
    match:title = ^(Open File|Save File|Open Folder)$
    float = true
}

windowrule {
    name = floating-utils
    match:class = ^(pavucontrol|nm-connection-editor|blueman-manager|mpv|polkit-gnome-authentication-agent-1)$
    float = true
}

windowrule {
    name = pip
    match:title = ^(Picture-in-Picture)$
    float = true
    pin = true
}

windowrule {
    name = kitty-opacity
    match:class = ^(kitty)$
    opacity = 0.95 0.85
}


windowrule {
    name = comms-workspace
    match:class = ^(discord|Slack)$
    workspace = 3
}

windowrule {
    name = suppress-maximize
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

# Steam / Gaming
windowrule {
    name = steam-popups
    match:class = ^(steam)$
    match:title = ^()$
    stay_focused = true
    min_size = 1 1
}


