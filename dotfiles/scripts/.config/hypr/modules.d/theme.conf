# Theme management keybinds
bind = $mainMod, T, exec, hyprpunk-rofi-theme-select
bind = $mainMod SHIFT, T, exec, hyprpunk-theme-next
bind = $mainMod, W, exec, hyprpunk-rofi-wallpaper-select
bind = $mainMod SHIFT, W, exec, hyprpunk-wallpaper-next

# Apply theme on login (set torrentz-hydra if no theme exists, otherwise refresh current)
exec-once = sleep 1 && bash -c 'if [[ ! -f ~/.config/kitty/theme.conf ]]; then ~/.local/bin/hyprpunk-theme-set torrentz-hydra 2>/dev/null || true; else ~/.local/bin/hyprpunk-theme-refresh 2>/dev/null || true; fi'
# Ensure wallpaper is set (swaybg doesn't persist across sessions)
exec-once = sleep 2 && bash -c 'if [[ -L ~/.config/hypr/wallpapers/current ]]; then swaybg -i ~/.config/hypr/wallpapers/current -m fill; else swaybg -c "#0F1016"; fi'
