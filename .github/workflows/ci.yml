name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch (only latest commit matters)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  script-tests:
    name: Script tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        test:
          - settings
          - theme-list
          - theme-current
          - theme-set
          - theme-cycle
          - bootstrap
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: test-${{ matrix.test }}
        run: nix build .#checks.x86_64-linux.${{ matrix.test }} --print-build-logs

  container-build:
    name: Container build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: script-tests
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Build container
        run: nix build .#checks.x86_64-linux.container-build --print-build-logs --no-link

  vm-integration:
    name: VM integration test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: script-tests
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            system-features = kvm
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run VM integration test
        run: nix build .#checks.x86_64-linux.vm-integration --print-build-logs

  build:
    name: Build desktop config
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: script-tests
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Build desktop system
        run: nix build .#nixosConfigurations.desktop.config.system.build.toplevel --print-build-logs --no-link
